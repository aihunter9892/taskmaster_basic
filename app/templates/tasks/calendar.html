{% extends 'base.html' %}
{% block title %}Calendar — TaskFlow{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="calendar-view">
    <div class="calendar-header">
        <div>
            <h1>Calendar</h1>
            <p style="color:var(--text-secondary); font-size:0.95rem; margin-top:0.25rem;">
                Tasks with due dates · click any event to edit
            </p>
        </div>
        <button class="btn btn--primary" id="cal-new-task">+ New Task</button>
    </div>

    <!-- Legend -->
    <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; font-size:0.8125rem; font-weight:600; color:var(--text-secondary);">
        <span style="display:flex; align-items:center; gap:0.375rem;">
            <span style="width:10px; height:10px; border-radius:50%; background:#E84393; display:inline-block;"></span> High
        </span>
        <span style="display:flex; align-items:center; gap:0.375rem;">
            <span style="width:10px; height:10px; border-radius:50%; background:#FC642D; display:inline-block;"></span> Medium
        </span>
        <span style="display:flex; align-items:center; gap:0.375rem;">
            <span style="width:10px; height:10px; border-radius:50%; background:#00A699; display:inline-block;"></span> Low
        </span>
    </div>

    <div class="calendar-wrap">
        <div id="calendar"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const events = {{ events | tojson }};

    const cal = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek',
        },
        events: events,
        height: 'auto',
        eventClick(info) {
            info.jsEvent.preventDefault();
            if (info.event.url) window.location.href = info.event.url;
        },
        eventMouseEnter(info) {
            const props = info.event.extendedProps;
            info.el.title = `${info.event.title}\nPriority: ${props.priority}\nStatus: ${props.status}${props.description ? '\n' + props.description : ''}`;
        },
        dayMaxEvents: 4,
        nowIndicator: true,
        selectable: true,
        select(info) {
            const modal = document.getElementById('cal-date-modal');
            if (modal) {
                document.getElementById('cal-due-date').value = info.startStr;
                modal.showModal();
            }
        },
    });
    cal.render();

    document.getElementById('cal-new-task')?.addEventListener('click', () => {
        document.getElementById('cal-date-modal')?.showModal();
    });
});
</script>

<!-- Quick-add task modal for calendar -->
<dialog id="cal-date-modal" class="modal">
    <div class="modal__header">
        <h2 class="modal__title">New Task</h2>
        <button class="modal__close" onclick="document.getElementById('cal-date-modal').close()" aria-label="Close">×</button>
    </div>
    <form method="POST" action="{{ url_for('tasks.create_task') }}" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal__body">
            <div class="form-group">
                <label class="form-label" for="cal-title">Title *</label>
                <input type="text" name="title" id="cal-title" class="form-control" placeholder="Task title" maxlength="200" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="cal-priority">Priority</label>
                    <select name="priority" id="cal-priority" class="form-control">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="cal-due-date">Due Date</label>
                    <input type="date" name="due_date" id="cal-due-date" class="form-control">
                </div>
            </div>
            <input type="hidden" name="status" value="todo">
            <input type="hidden" name="category_id" value="0">
        </div>
        <div class="modal__footer">
            <button type="button" class="btn btn--outline" onclick="document.getElementById('cal-date-modal').close()">Cancel</button>
            <button type="submit" class="btn btn--primary">Create Task</button>
        </div>
    </form>
</dialog>
{% endblock %}
